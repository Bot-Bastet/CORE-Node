name: Release CORE-Node (.exe)

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build-exe:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@11bd719001b34e40263f35031b2b6271c662862c # v4

      - name: Setup Python 3.11
        uses: actions/setup-python@42375524e432c748c1054dc257321598ce366bf9 # v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install customtkinter
          pip install requests
          pip install websockets
          pip install pillow
          pip install sounddevice
          pip install scipy
          pip install numpy
          pip install pyttsx3
          pip install opencv-python-headless

      - name: Extract version
        id: version
        shell: bash
        run: echo "VERSION=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT

      - name: Update version.txt
        shell: bash
        run: echo "${{ steps.version.outputs.VERSION }}" > version.txt

      - name: Build .exe with PyInstaller
        run: |
          pyinstaller `
            --onefile `
            --windowed `
            --name "CORE-Node" `
            --add-data "version.txt;." `
            --hidden-import "customtkinter" `
            --hidden-import "websockets" `
            --hidden-import "requests" `
            --hidden-import "sounddevice" `
            --hidden-import "scipy" `
            --hidden-import "scipy.io.wavfile" `
            --hidden-import "numpy" `
            --hidden-import "pyttsx3" `
            --hidden-import "pyttsx3.drivers" `
            --hidden-import "pyttsx3.drivers.sapi5" `
            --hidden-import "cv2" `
            --collect-all "customtkinter" `
            --collect-all "sounddevice" `
            main.py

      - name: Rename output
        run: |
          move dist\CORE-Node.exe dist\CORE-Node-${{ steps.version.outputs.VERSION }}.exe

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@01570a1f39cb165f1295980062a4d33a7587ef7d # v2
        with:
          name: "CORE-Node ${{ steps.version.outputs.VERSION }}"
          body: |
            ## CORE-Node ${{ steps.version.outputs.VERSION }}

            Application Windows de station de calcul pour le projet Bastet.

            ### Installation
            1. Télécharger `CORE-Node-${{ steps.version.outputs.VERSION }}.exe`
            2. Lancer l'application
            3. Configurer l'IP de la Gateway et le Token dans Paramètres

            > **Note** : Les dépendances lourdes (Torch, Whisper, Ollama, YOLO, Bark) sont chargées à la demande au runtime.
            > Ollama doit être installé séparément : https://ollama.com

            ### Mise à jour automatique
            L'application vérifie automatiquement les nouvelles versions au démarrage.
          files: |
            dist/CORE-Node-${{ steps.version.outputs.VERSION }}.exe
          draft: false
          prerelease: ${{ contains(steps.version.outputs.VERSION, '-beta') || contains(steps.version.outputs.VERSION, '-rc') }}
