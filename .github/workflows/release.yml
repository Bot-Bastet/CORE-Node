name: Release CORE-Node (.exe)

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  # ===========================================================================
  # 1. Analyse Statique & Style (Flake8 & Black)
  # ===========================================================================
  lint:
    name: Lint Code
    runs-on: ubuntu-latest
    outputs:
      warnings_count: ${{ steps.parse.outputs.warnings_count }}
      formatted: ${{ steps.parse.outputs.formatted }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      
      - name: Set up Python
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5
        with:
          python-version: '3.10'
          cache: 'pip'
          
      - name: Install linting tools
        run: |
          pip install flake8 black
          
      - name: Run flake8 Analysis
        run: |
          # Bloque immédiatement le workflow s'il y a des erreurs de syntaxe critiques
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          # Compte les autres avertissements de style et de complexité
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics > flake8_report.txt

      - name: Check code formatting (Black)
        run: |
          black --check . --exclude='(\.git|\.github|build|dist)' > black_report.txt 2>&1 || true

      - name: Parse Reports
        id: parse
        run: |
          # Extrait le nombre d'avertissements de flake8
          WARNINGS=$(tail -n 1 flake8_report.txt || echo "0")
          echo "warnings_count=$WARNINGS" >> $GITHUB_OUTPUT
          
          # Vérifie si Black demande un reformatage
          if grep -q "would reformat" black_report.txt; then
            echo "formatted=no" >> $GITHUB_OUTPUT
          else
            echo "formatted=yes" >> $GITHUB_OUTPUT
          fi

      - name: Upload Lint Reports
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: lint-reports
          path: |
            flake8_report.txt
            black_report.txt

  # ===========================================================================
  # 2. Détection de Duplication de Code (jscpd)
  # ===========================================================================
  duplication:
    name: Code Duplication (jscpd)
    runs-on: ubuntu-latest
    outputs:
      percentage: ${{ steps.parse.outputs.percentage }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      
      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: "20"
          
      - name: Install jscpd
        run: npm install -g jscpd
        
      - name: Analyse des duplications
        run: |
          jscpd . \
            --threshold 10 \
            --min-lines 5 \
            --min-tokens 50 \
            --reporters "console" \
            --ignore "**/__pycache__/**,**/dist/**,**/build/**,**/.git/**,**/node_modules/**,**/*.wav,**/*.exe,**/*.spec" > jscpd_output.txt 2>&1 || true
            
      - name: Parse and validate duplication
        id: parse
        run: |
          python -c "
          import re, os
          with open('jscpd_output.txt') as f:
              text = f.read()
          match = re.search(r'(\d+\.?\d*)\s*%', text)
          val = float(match.group(1)) if match else 0.0
          percentage = f'{val}%'
          print(f'Duplication détectée: {percentage}')
          with open(os.environ['GITHUB_OUTPUT'], 'a') as out:
              out.write(f'percentage={percentage}\n')
          if val > 10.0:
              print('Error: La duplication de code dépasse le seuil maximal autorisé de 10% !')
              exit(1)
          "

  # ===========================================================================
  # 3. Analyse de Sécurité SAST (Semgrep)
  # ===========================================================================
  security:
    name: SAST Security Scan (Semgrep)
    runs-on: ubuntu-latest
    outputs:
      findings_count: ${{ steps.parse.outputs.findings_count }}
    container:
      image: semgrep/semgrep:1.114.0
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      
      - name: Scan Semgrep
        env:
          SEMGREP_SEND_METRICS: "off"
        run: |
          semgrep scan --config p/security-audit --config p/owasp-top-ten --json --output semgrep_results.json . || true
          
      - name: Parse and validate security findings
        id: parse
        run: |
          python -c "
          import json, os
          with open('semgrep_results.json') as f:
              data = json.load(f)
          count = len(data.get('results', []))
          print(f'Failles de sécurité trouvées: {count}')
          with open(os.environ['GITHUB_OUTPUT'], 'a') as out:
              out.write(f'findings_count={count}\n')
          if count > 0:
              print('Error: Faille de sécurité détectée par Semgrep. Release bloquée !')
              exit(1)
          "

  # ===========================================================================
  # 4. Scan de Vulnérabilités & Secrets (Trivy)
  # ===========================================================================
  vulnerability:
    name: Vuln & Secrets Scan (Trivy)
    runs-on: ubuntu-latest
    outputs:
      issues_count: ${{ steps.parse.outputs.issues_count }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      
      - name: Scan Trivy
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: "fs"
          scan-ref: "."
          scanners: "vuln,secret"
          severity: "HIGH,CRITICAL"
          format: "json"
          output: "trivy_results.json"
          
      - name: Parse and validate Trivy findings
        id: parse
        run: |
          python -c "
          import json, os
          with open('trivy_results.json') as f:
              data = json.load(f)
          results = data.get('Results', [])
          issues = 0
          for r in results:
              issues += len(r.get('Vulnerabilities', [])) + len(r.get('Secrets', []))
          print(f'Vulnérabilités ou secrets critiques trouvés: {issues}')
          with open(os.environ['GITHUB_OUTPUT'], 'a') as out:
              out.write(f'issues_count={issues}\n')
          if issues > 0:
              print('Error: Vulnérabilités/secrets de sévérité HIGH/CRITICAL détectés par Trivy. Release bloquée !')
              exit(1)
          "

  # ===========================================================================
  # 5. Compilation Windows & Publication de la Release
  # ===========================================================================
  build-exe:
    needs: [lint, duplication, security, vulnerability]
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: Download Lint Reports
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: lint-reports
          path: ./reports

      - name: Setup Python 3.11
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install customtkinter
          pip install requests
          pip install websockets
          pip install pillow
          pip install sounddevice
          pip install scipy
          pip install numpy
          pip install pyttsx3
          pip install opencv-python-headless

      - name: Extract version
        id: version
        shell: bash
        run: echo "VERSION=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT

      - name: Update version.txt
        shell: bash
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: echo "$VERSION" > version.txt

      - name: Build .exe with PyInstaller
        run: |
          pyinstaller `
            --onefile `
            --windowed `
            --name "CORE-Node" `
            --add-data "version.txt;." `
            --hidden-import "customtkinter" `
            --hidden-import "websockets" `
            --hidden-import "requests" `
            --hidden-import "certifi" `
            --hidden-import "sounddevice" `
            --hidden-import "scipy" `
            --hidden-import "scipy.io.wavfile" `
            --hidden-import "numpy" `
            --hidden-import "pyttsx3" `
            --hidden-import "pyttsx3.drivers" `
            --hidden-import "pyttsx3.drivers.sapi5" `
            --hidden-import "cv2" `
            --collect-all "customtkinter" `
            --collect-all "sounddevice" `
            main.py

      - name: Rename output
        shell: bash
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          mv dist/CORE-Node.exe dist/CORE-Node-$VERSION.exe

      - name: Upload Windows Artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: win-artifact
          path: dist/CORE-Node-${{ steps.version.outputs.VERSION }}.exe
          retention-days: 1

  build-mac:
    needs: [lint, duplication, security, vulnerability]
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: Setup Python 3.11
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5
        with:
          python-version: '3.11'

      - name: Install System Dependencies
        run: |
          brew install portaudio

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install customtkinter
          pip install requests
          pip install websockets
          pip install pillow
          pip install sounddevice
          pip install scipy
          pip install numpy
          pip install pyttsx3
          pip install opencv-python-headless

      - name: Extract version
        id: version
        shell: bash
        run: echo "VERSION=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT

      - name: Update version.txt
        shell: bash
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: echo "$VERSION" > version.txt

      - name: Build macOS App with PyInstaller
        run: |
          pyinstaller \
            --onefile \
            --windowed \
            --name "CORE-Node" \
            --add-data "version.txt:." \
            --hidden-import "customtkinter" \
            --hidden-import "websockets" \
            --hidden-import "requests" \
            --hidden-import "certifi" \
            --hidden-import "sounddevice" \
            --hidden-import "scipy" \
            --hidden-import "scipy.io.wavfile" \
            --hidden-import "numpy" \
            --hidden-import "pyttsx3" \
            --hidden-import "pyttsx3.drivers" \
            --hidden-import "pyttsx3.drivers.nsss" \
            --hidden-import "cv2" \
            --collect-all "customtkinter" \
            --collect-all "sounddevice" \
            main.py

      - name: Zip macOS App Bundle
        run: |
          cd dist
          zip -r ../CORE-Node-macOS.zip CORE-Node.app

      - name: Rename Zip Archive
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          mv CORE-Node-macOS.zip CORE-Node-$VERSION-macOS.zip

      - name: Upload macOS Artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: mac-artifact
          path: CORE-Node-*-macOS.zip
          retention-days: 1

  publish-release:
    needs: [build-exe, build-mac, lint, duplication, security, vulnerability]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: Download Windows Artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: win-artifact
          path: ./dist

      - name: Download macOS Artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: mac-artifact
          path: ./dist

      - name: Extract version
        id: version
        shell: bash
        run: echo "VERSION=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT

      - name: Generate Release Body
        shell: bash
        run: |
          cat << 'EOF' > release_body.md
          ## CORE-Node ${{ steps.version.outputs.VERSION }}

          Application station de calcul pour le projet Bastet.

          ### 📦 Téléchargements
          * 🪟 Windows : Télécharger `CORE-Node-${{ steps.version.outputs.VERSION }}.exe`
          * 🍎 macOS (Apple Silicon M1/M2/M3/M4) : Télécharger `CORE-Node-${{ steps.version.outputs.VERSION }}-macOS.zip` (décompresser et lancer `CORE-Node.app`)

          ### 🔧 Notes d'utilisation macOS (Gatekeeper)
          Comme l'application n'est pas signée avec un certificat développeur payant Apple :
          1. Téléchargez et décompressez le fichier `.zip`
          2. Faites un **clic droit** sur `CORE-Node.app` et sélectionnez **Ouvrir**
          3. Cliquez sur **Ouvrir** dans la boîte de dialogue de confirmation

          > **Note** : Les dépendances lourdes (Torch, Whisper, Ollama, YOLO, Bark) sont chargées à la demande au runtime.
          > Ollama doit être installé séparément : https://ollama.com

          ### 📊 Rapport de Qualité & Sécurité (Quality Gate)
          | Test | Statut | Métrique | Limite |
          | :--- | :---: | :---: | :---: |
          | 🔍 Syntaxe & Erreurs critiques (Flake8) | ✅ Conforme | 0 erreur | 0 |
          | 📏 Avertissements de style (Flake8) | ✅ Info | ${{ needs.lint.outputs.warnings_count }} avertissements | Info |
          | ✨ Formatage de code (Black) | ${{ needs.lint.outputs.formatted == 'yes' && '✅ Conforme' || '⚠️ Non conforme' }} | ${{ needs.lint.outputs.formatted == 'yes' && 'Formaté' || 'Non formaté' }} | Info |
          | 📏 Duplication de code (jscpd) | ✅ Conforme | ${{ needs.duplication.outputs.percentage }} | <= 10% |
          | 🛡️ Failles de sécurité (Semgrep) | ✅ Conforme | ${{ needs.security.outputs.findings_count }} faille | 0 |
          | 🔐 Vulnérabilités & Secrets (Trivy) | ✅ Conforme | ${{ needs.vulnerability.outputs.issues_count }} vuln/secret | 0 |
          EOF

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2.6.2
        with:
          name: "CORE-Node ${{ steps.version.outputs.VERSION }}"
          body_path: release_body.md
          files: |
            dist/CORE-Node-${{ steps.version.outputs.VERSION }}.exe
            dist/CORE-Node-${{ steps.version.outputs.VERSION }}-macOS.zip
          draft: false
          prerelease: ${{ contains(steps.version.outputs.VERSION, '-beta') || contains(steps.version.outputs.VERSION, '-rc') }}
