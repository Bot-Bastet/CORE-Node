name: Release CORE-Node (.exe)

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build-exe:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install customtkinter websockets requests

      - name: Build .exe with PyInstaller
        run: |
          pyinstaller `
            --onefile `
            --windowed `
            --name "CORE-Node" `
            --icon "ui/assets/icon.ico" `
            --add-data "ui/assets;ui/assets" `
            --hidden-import "customtkinter" `
            --hidden-import "websockets" `
            main.py
        continue-on-error: false

      - name: Fallback build (without icon if missing)
        if: failure()
        run: |
          pyinstaller `
            --onefile `
            --windowed `
            --name "CORE-Node" `
            --hidden-import "customtkinter" `
            --hidden-import "websockets" `
            main.py

      - name: Extract version
        id: version
        shell: bash
        run: echo "VERSION=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT

      - name: Rename output
        run: |
          mv dist/CORE-Node.exe dist/CORE-Node-${{ steps.version.outputs.VERSION }}.exe

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "CORE-Node ${{ steps.version.outputs.VERSION }}"
          body: |
            ## CORE-Node ${{ steps.version.outputs.VERSION }}

            Application Windows de station de calcul pour le projet Bastet.

            ### Installation
            1. Télécharger `CORE-Node-${{ steps.version.outputs.VERSION }}.exe`
            2. Lancer l'application
            3. Configurer l'IP de la Gateway et le Token dans Paramètres

            ### Mise à jour
            L'application vérifie automatiquement les nouvelles versions au démarrage.
          files: |
            dist/CORE-Node-${{ steps.version.outputs.VERSION }}.exe
          draft: false
          prerelease: ${{ contains(steps.version.outputs.VERSION, '-beta') || contains(steps.version.outputs.VERSION, '-rc') }}
